name: Deploy to K8s

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_URI: 136518012422.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_NAME: myapp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 🔥 LOGIN (same as your command)
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin $ECR_URI

    # 🔥 BUILD
    - name: Build Docker image
      run: docker build -t $IMAGE_NAME .

    # 🔥 TAG (with commit id = pro level)
    - name: Tag Docker image
      run: docker tag $IMAGE_NAME:latest $ECR_URI/$IMAGE_NAME:${{ github.sha }}

    # 🔥 PUSH
    - name: Push to ECR
      run: docker push $ECR_URI/$IMAGE_NAME:${{ github.sha }}

    # 🔥 UPDATE K8S
    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/todo-app \
        todo-container=$ECR_URI/$IMAGE_NAME:${{ github.sha }} \
        -n dev