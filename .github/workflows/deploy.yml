name: Deploy to K8s

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_URI: 136518012422.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_NAME: myapp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Configure AWS credentials (FIXED 🔥)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3️⃣ Verify AWS (debug - optional)
    - name: Verify AWS identity
      run: aws sts get-caller-identity

    # 4️⃣ Login to Amazon ECR
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin $ECR_URI

    # 5️⃣ Build Docker image
    - name: Build Docker image
      run: docker build -t $IMAGE_NAME .

    # 6️⃣ Tag Docker image (use commit SHA 🔥)
    - name: Tag Docker image
      run: docker tag $IMAGE_NAME:latest $ECR_URI/$IMAGE_NAME:${{ github.sha }}

    # 7️⃣ Push image to ECR
    - name: Push to ECR
      run: docker push $ECR_URI/$IMAGE_NAME:${{ github.sha }}

    # 8️⃣ Setup Kubeconfig (IMPORTANT 🔥)
    - name: Setup Kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig

    # 9️⃣ Deploy to Kubernetes
    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/todo-app \
        todo-container=$ECR_URI/$IMAGE_NAME:${{ github.sha }} \
        -n dev

    # 🔟 Verify deployment
    - name: Check Pods
      run: kubectl get pods -n dev